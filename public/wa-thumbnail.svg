<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">qinvi Wedding Invitation Preview</title>
  <desc id="desc">WhatsApp preview thumbnail for qinvi digital wedding invitation.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8edd9"/>
      <stop offset="0.55" stop-color="#fbf5ec"/>
      <stop offset="1" stop-color="#f4d6d0"/>
    </linearGradient>
    <linearGradient id="cardOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20201d" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#2a2420" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#1c1511" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="flowers" cx="52%" cy="50%" r="68%">
      <stop offset="0" stop-color="#f6eee5"/>
      <stop offset="0.28" stop-color="#d9c3b1"/>
      <stop offset="0.55" stop-color="#9c8779"/>
      <stop offset="1" stop-color="#312721"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#2d211b" flood-opacity="0.22"/>
    </filter>
    <filter id="blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#page)"/>

  <g filter="url(#softShadow)">
    <clipPath id="cardClip">
      <rect x="80" y="40" width="1040" height="550" rx="58"/>
    </clipPath>
    <g clip-path="url(#cardClip)">
      <rect x="80" y="40" width="1040" height="550" fill="url(#flowers)"/>
      <g opacity="0.78" filter="url(#blur)">
        <circle cx="500" cy="245" r="84" fill="none" stroke="#d8c6b8" stroke-width="18"/>
        <circle cx="610" cy="242" r="82" fill="none" stroke="#b5a292" stroke-width="18"/>
        <circle cx="230" cy="455" r="118" fill="#d7a6a4" opacity="0.42"/>
        <circle cx="955" cy="430" r="150" fill="#e2b7a7" opacity="0.28"/>
        <circle cx="690" cy="390" r="170" fill="#f5eadb" opacity="0.30"/>
      </g>
      <rect x="80" y="40" width="1040" height="550" fill="url(#cardOverlay)"/>
    </g>
  </g>

  <text x="142" y="93" fill="#ffffff" opacity="0.9" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="12">WEDDING INVITATION</text>
  <path d="M1010 79c-15-24-57-9-57 24 0 31 57 61 57 61s57-30 57-61c0-33-42-48-57-24z" fill="#fff" transform="scale(.42) translate(1320 72)"/>

  <g>
    <path d="M80 160h300c32 0 58 26 58 58v60c0 32-26 58-58 58H80z" fill="#fff"/>
    <text x="136" y="215" fill="#7e6f61" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800" letter-spacing="6">LIVE RSVP</text>
    <text x="136" y="283" fill="#211913" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="800">324</text>
    <text x="265" y="276" fill="#008f5a" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800">CONFIRMED</text>
  </g>

  <text x="140" y="416" fill="#fff" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700">Alya</text>
  <text x="140" y="510" fill="#fff" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700">&amp; Raka</text>
  <text x="145" y="565" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="3">SABTU, 24 OKT 2026</text>
  <text x="488" y="565" fill="#fff" opacity="0.55" font-family="Arial, Helvetica, sans-serif" font-size="19">|</text>
  <text x="535" y="565" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="3">JAKARTA</text>

  <g>
    <rect x="140" y="588" width="270" height="62" rx="31" fill="none" stroke="#fff" stroke-opacity="0.55" stroke-width="2" transform="translate(0 -45)"/>
    <text x="225" y="583" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">SAVE DATE</text>
    <rect x="440" y="543" width="220" height="62" rx="31" fill="none" stroke="#fff" stroke-opacity="0.45" stroke-width="2"/>
    <text x="520" y="583" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">RSVP</text>
  </g>

  <g>
    <rect x="760" y="512" width="315" height="92" rx="28" fill="#201914" fill-opacity="0.94" stroke="#fff" stroke-opacity="0.10"/>
    <rect x="790" y="534" width="58" height="58" rx="16" fill="#fff" fill-opacity="0.12"/>
    <g fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round">
      <path d="M806 550h10v10h-10zM826 550h8v8h-8zM806 570h8v8h-8zM828 570h10v10h-10z"/>
      <path d="M820 565h8M818 580h4M838 558h5"/>
    </g>
    <text x="884" y="556" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="800">QR CHECK-IN</text>
    <text x="884" y="586" fill="#fff" opacity="0.65" font-family="Arial, Helvetica, sans-serif" font-size="14">One-time scan</text>
  </g>
</svg>
